<!DOCTYPE HTML>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="kindle-display-size" content="width=100%, height=100%, scale-to-fit=yes" />
  <meta charset="utf-8">
  <link rel="preload" href="assets/fonts/language.ttf" as="font" type="font/ttf" crossorigin="anonymous">
  <script src="js/polyfill.min.js"></script>
  <script src="js/sdk.js"></script>
  <script src="js/kanki_config.js"></script>
  <script src="main.js"></script>
  <link href="main.css" rel="stylesheet">
  <link href="responsive.css" rel="stylesheet">
  <title>KAnki</title>
  <script>
    function update() {
      var chromebar = {
        "appId": "xyz.kurizu.kanki",
        "topNavBar": {
          "template": "title",
          "title": "KAnki",
          "buttons": [
            {
              "id": "KPP_MORE",
              "state": "enabled",
              "handling": "system"
            },
            {
              "id": "KPP_CLOSE",
              "state": "enabled",
              "handling": "system"
            }
          ],
        },
        "systemMenu": {
          "clientParams": {
            "profile": {
              "name": "default",
              "items": [
                {
                  "id": "KANKI_RELOAD",
                  "state": "enabled",
                  "handling": "notifyApp",
                  "label": "Reload",
                  "position": 0
                }
              ],
              "selectionMode": "none",
              "closeOnUse": true
            }
          }
        }
      };
      window.kindle.messaging.sendMessage("com.lab126.chromebar", "configureChrome", chromebar);
    };

    window.kindle.appmgr.ongo = function (ctx) {
      update();
      window.kindle.messaging.receiveMessage("systemMenuItemSelected", function (type, id) {
        switch (id) {
          case "KANKI_RELOAD":
            window.location.reload();
        };
      });
    };
  </script>
</head>

<body onload="onPageLoad()">
  <div id="log" style="display:none;"></div>

  <div id="headerBar">
    <div class="topBar">
      <div class="logoArea">
        <h1 id="title">KAnki</h1>
      </div>
      <div class="infoArea">
        <div id="progressDisplay" class="progressBar"></div>
        <div id="levelDisplay" class="levelDisplay"></div>
      </div>
    </div>
    <div class="menuBar">
      <div id="levelButtons" class="menuSection">
        <button onclick="changeLevel('all')">All Levels</button>
        <!-- Other level buttons will be added dynamically by JavaScript -->
      </div>
      <div class="menuDivider"></div>
      <div id="toolButtons" class="menuSection">
        <button id="starredFilterBtn" onclick="toggleStarredFilter()">★ Star</button>
        <button id="reverseToggleBtn" onclick="toggleCardDirection()">↔ Flip</button>
        <button id="overviewBtn" onclick="showDeckOverview()" style="display: none;">← Overview</button>
      </div>
    </div>
  </div>

  <div id="mainContainer">
    <!-- Deck Overview Screen -->
    <div id="deckOverview" style="display: none;">
      <div class="deckOverview">
        <h2 id="overviewDeckTitle"></h2>
        <table class="overviewStatTable">
          <tbody>
            <tr><td>Total:</td><td id="overviewTotal"></td></tr>
            <tr><td>Due now:</td><td id="overviewDue"></td></tr>
            <tr><td>New:</td><td id="overviewNew"></td></tr>
            <tr><td>Suspended:</td><td id="overviewSuspended"></td></tr>
          </tbody>
        </table>
        <div class="overviewDivider">── By Level ──</div>
        <div id="overviewLevels"></div>
        <div class="buttonContainer overviewButtons">
          <button onclick="startStudy()">Study</button>
          <button onclick="showBrowseScreen()">Browse Cards</button>
        </div>
      </div>
    </div>

    <div id="statusMessage" style="display: none;"></div>

    <!-- Review Mode: Fixed card structure to prevent DOM rebuilding -->
    <div id="cardContainer" class="card">
      <div id="levelBadge" class="levelBadge"></div>
      <!-- Add star button to the card -->
      <button id="starButton" class="starButton" onclick="toggleStarCurrentCard()">☆</button>
      <div id="cardFront" class="cardFront"></div>
      <div id="cardBack" class="cardBack"></div>
      <div id="cardNotes" class="cardNotes"></div>
      <!-- Card statistics section -->
      <div id="cardStats" class="cardStats"></div>
    </div>

    <!-- Browse Mode: Card list view -->
    <div id="browseContainer" style="display: none;">
      <div id="browseHeader" class="browseHeader">
        <div class="browseHeaderTop">
          <span id="browseStats" class="browseStats"></span>
          <button onclick="hideBrowseScreen()">← Back</button>
        </div>
        <div id="browseLevelFilter" class="browseLevelFilter"></div>
        <div id="browseControls" class="browseControls">
          <button onclick="selectAllCards()">Select All</button>
          <button onclick="deselectAllCards()">Deselect All</button>
          <button onclick="toggleSuspendSelected()" id="suspendBtn" style="display: none;">Suspend</button>
          <button onclick="toggleSuspendSelected()" id="unsuspendBtn" style="display: none;">Unsuspend</button>
          <button onclick="addTagToSelected()" id="addTagBtn" style="display: none;">Add Tag</button>
          <button onclick="removeTagFromSelected()" id="removeTagBtn" style="display: none;">Rm Tag</button>
        </div>
      </div>
      <div id="browseCardList" class="browseCardList"></div>
      <div id="browsePagination" class="browsePagination"></div>
    </div>

    <div id="controlButtons" class="buttonContainer">
      <button id="showAnswerBtn" onclick="showAnswer()">Show Answer</button>
      <div id="intervalButtons" style="display: none;">
        <button class="intervalBtn againBtn" onclick="handleAnswerWithInterval('again')">Again<br>&lt;10m</button>
        <button class="intervalBtn hardBtn" onclick="handleAnswerWithInterval('hard')">Hard<br>1d</button>
        <button class="intervalBtn goodBtn" onclick="handleAnswerWithInterval('good')">Good<br>3d</button>
        <button class="intervalBtn easyBtn" onclick="handleAnswerWithInterval('easy')">Easy<br>4d</button>
      </div>
    </div>

    <div class="buttonContainer">
      <button onclick="showResetProgressConfirm()">Reset Progress</button>
      <button onclick="showResetAllConfirm()">Reset All Data</button>
      <button onclick="showBrowseScreen()">Browse Cards</button>
    </div>
  </div>

  <!-- Confirmation popup overlay (hidden by default) -->
  <div id="confirmationOverlay" class="overlay" style="display: none;">
    <div class="popup">
      <div id="confirmationMessage" class="popup-message"></div>
      <div class="popup-buttons">
        <button id="confirmYesBtn" class="confirmBtn">Yes</button>
        <button id="confirmNoBtn" class="cancelBtn">No</button>
      </div>
    </div>
  </div>

  <!-- Toast notification (hidden by default) -->
  <div id="toastNotification" class="toast-notification" style="display: none;"></div>

  <div class="footer">
    <p>v1.1.2</p>
  </div>
</body>

</html>
